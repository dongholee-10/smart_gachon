# 시연·개발용 PostgreSQL 서비스.
# 백엔드(uvicorn)와 프론트(vite)는 로컬에서 직접 돌리고, DB만 컨테이너로 띄운다.
#
# 사용:
#   docker compose up -d db          # PG 백그라운드 기동
#   docker compose logs -f db        # 로그 확인
#   docker compose down              # 컨테이너 중지 (volume 보존)
#   docker compose down -v           # volume까지 삭제 (데이터 전부 날아감)

services:
  db:
    image: postgres:16-alpine
    container_name: redflag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: redflag
      POSTGRES_PASSWORD: redflag
      POSTGRES_DB: redflag
      # SQL 명령에 한국어가 섞여도 깨지지 않도록 UTF-8 강제
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redflag -d redflag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
    name: redflag-pgdata
